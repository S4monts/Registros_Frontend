<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiresFlow - Acceso al Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        uccDark: '#132740',
                        uccLight: '#00acc9',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- PROTECCIÓN INMEDIATA: Script inline que se ejecuta ANTES que cualquier otra cosa -->
    <script>
        (function() {
            console.log("🔒 Ejecutando script de protección de seguridad...");

            // Parámetros sensibles que NO deben estar en la URL
            const FORBIDDEN_PARAMS = ["email", "password", "username", "token", "access_token", "secret"];

            // Obtener parámetros actuales de la URL
            const urlParams = new URLSearchParams(window.location.search);
            let needsCleanup = false;

            // Verificar si hay parámetros sensibles
            for (const param of FORBIDDEN_PARAMS) {
                if (urlParams.has(param)) {
                    console.warn(`🔒 SEGURIDAD: Se detectó '${param}' en la URL. Limpiando...`);
                    needsCleanup = true;
                }
            }

            // Si se encontraron parámetros sensibles, limpiar la URL
            if (needsCleanup) {
                console.log(`✅ URL limpiada a: ${window.location.pathname}`);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        })();
    </script>

    <!-- Scripts de aplicación cargados con defer -->
    <!-- ⚠️ ORDEN CRÍTICO: config.js DEBE cargarse ANTES que api.js y login.js -->
    <script src="js/config.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/login.js" defer></script>
</head>

<body class="bg-slate-50 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <img src="img/ucc.png" alt="UCC Logo" class="h-14 object-contain">
            <div class="h-12 w-px bg-slate-300"></div>
            <div>
                <p class="text-xs font-black uppercase tracking-widest text-slate-500">Gestión de Infraestructura</p>
                <p class="text-2xl font-black text-uccDark">AiresFlow</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-xs text-slate-500 font-semibold">Universidad Cooperativa de Colombia</p>
            <p class="text-xs text-slate-400">Campus Montería • v1.0.0</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">

                <!-- Header del formulario -->
                <div class="bg-gradient-to-r from-uccDark to-slate-800 p-12 text-center border-b border-slate-300">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-uccLight/10 rounded-full mb-4">
                        <i class="fas fa-lock text-uccLight text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-black text-white mb-1">Acceso Seguro</h2>
                    <p class="text-slate-300 text-sm font-medium">Ingresa tus credenciales institucionales</p>
                </div>

                <!-- Formulario de Login: method="post" es CRÍTICO para el js intercepte antes del envío -->
                <form id="loginForm" method="post" class="p-10 space-y-6" novalidate>

                    <!-- Campo Email -->
                    <div>
                        <label for="email" class="block text-xs font-black uppercase tracking-widest text-slate-600 mb-2">
                            Correo Institucional
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 pointer-events-none">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                required
                                autocomplete="email"
                                class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl text-sm font-normal placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-uccLight focus:border-transparent transition"
                                placeholder="usuario@ucc.edu.co"
                            >
                        </div>
                    </div>

                    <!-- Campo Password -->
                    <div>
                        <label for="password" class="block text-xs font-black uppercase tracking-widest text-slate-600 mb-2">
                            Contraseña
                        </label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 pointer-events-none">
                                <i class="fas fa-key"></i>
                            </span>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                required
                                autocomplete="current-password"
                                class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl text-sm font-normal placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-uccLight focus:border-transparent transition"
                                placeholder="••••••••"
                            >
                        </div>
                    </div>

                    <!-- Botón Submit -->
                    <button
                        id="submitBtn"
                        type="submit"
                        class="w-full bg-uccDark hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all duration-200 transform hover:shadow-xl active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span id="btnText">Entrar al Sistema</span>
                        <i class="fas fa-arrow-right" id="btnIcon"></i>
                    </button>

                    <!-- Contenedor de errores -->
                    <div id="errorContainer" class="hidden p-4 bg-red-50 border border-red-200 rounded-lg">
                        <p id="errorMessage" class="text-sm text-red-700 font-medium"></p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Script de validación: Verifica que login.js esté funcionando correctamente -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Esperar a que login.js se haya cargado (máximo 500ms)
            setTimeout(function() {
                // Si initializeLoginForm no existe, es que login.js no cargó
                if (typeof initializeLoginForm === 'undefined') {
                    console.error("❌ CRÍTICO: login.js no se cargó correctamente");
                    document.getElementById("errorContainer").classList.remove("hidden");
                    document.getElementById("errorMessage").textContent =
                        "Error al cargar el sistema. Por favor, recarga la página (Ctrl+F5)";
                }
            }, 500);
        });
    </script>

    <!-- Comprobación opcional ya integrada arriba; scripts principales se cargan con defer -->

</body>
</html>
