<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Usuarios</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#e0f2fe] to-[#bae6fd] text-slate-900">
  <header class="border-b border-[#16a34a] bg-[#22c55e] backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-2.5">
      <div class="flex items-center gap-2.5">
        <div class="flex h-20 w-20 items-center justify-center rounded-xl">
          <img src="img/ucc.png" alt="Logo" class="h-20 w-20 object-contain">
        </div>
        <div>
          <p class="text-sm font-semibold tracking-[0.2em] text-white">Sistema de Mantenimiento</p>
        </div>
      </div>

      <div class="relative">
        <button
          id="userMenuButton"
          type="button"
          class="inline-flex items-center gap-2 rounded-xl border border-white/30 bg-white/10 px-4 py-2 text-sm font-semibold text-white transition hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white/40"
          aria-expanded="false"
          aria-controls="userMenu"
        >
          Hola, <span id="username" class="font-bold">Usuario</span>
          <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.168l3.71-3.94a.75.75 0 0 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06Z" clip-rule="evenodd"/>
          </svg>
        </button>

        <div id="userMenu" class="absolute right-0 z-20 mt-2 hidden w-52 rounded-2xl border border-slate-200 bg-white p-2 shadow-lg shadow-black/20">
          <a href="usuarios.html" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">Panel de usuarios</a>
          <a href="equipos.html" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">Panel de registros</a>
          <a href="base.html" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">Cerrar sesion</a>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-10 md:pt-10">
    <div class="mb-6">
      <h1 class="text-2xl font-bold md:text-3xl text-slate-900">Panel de Usuarios</h1>
      <p class="mt-1 text-slate-700">Gestión de usuarios del sistema</p>
    </div>

    <!-- Contenedor de controles -->
    <div class="mb-6 flex gap-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-lg">
      <button id="crearBtn" type="button" class="rounded-xl bg-slate-900 px-6 py-2.5 text-sm font-semibold text-white hover:bg-slate-800 transition">Crear</button>
      <button id="modificarBtn" type="button" class="rounded-xl bg-blue-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 transition">Modificar</button>
      <button id="cancelarSeleccionBtn" type="button" class="hidden rounded-xl border border-slate-600 px-6 py-2.5 text-sm font-semibold text-slate-900 hover:bg-slate-100 transition">Cancelar</button>
      <button id="confirmarBtn" type="button" class="hidden rounded-xl bg-green-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-green-700 transition">Confirmar</button>
      <button id="eliminarBtn" type="button" class="hidden rounded-xl bg-red-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-red-700 transition">Eliminar</button>
      <a href="mantes.html" class="ml-auto rounded-xl bg-red-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-red-700 transition">Volver</a>
    </div>

    <!-- Tabla de usuarios -->
    <div class="relative overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-2xl shadow-black/20">
      <table class="w-full text-left text-sm text-slate-900">
        <thead class="border-b border-slate-200 bg-white text-xs uppercase text-slate-800">
          <tr>
            <th scope="col" class="px-6 py-3 w-12 hidden-checkbox">
              <input type="checkbox" id="selectAll" class="rounded border-slate-300">
            </th>
            <th scope="col" class="px-6 py-3">Registro</th>
            <th scope="col" class="px-6 py-3">ID Usuario</th>
            <th scope="col" class="px-6 py-3">Permisos</th>
            <th scope="col" class="px-6 py-3">Nombre</th>
            <th scope="col" class="px-6 py-3">Apellidos</th>
            <th scope="col" class="px-6 py-3">Teléfono</th>
            <th scope="col" class="px-6 py-3">Correo</th>
          </tr>
        </thead>
        <tbody id="usuariosTable">
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal de crear/modificar usuario -->
  <div id="modalUsuario" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white shadow-2xl">
      <div class="border-b border-slate-200 px-6 py-4">
        <h2 id="modalTitle" class="text-2xl font-bold text-slate-900">Crear Usuario</h2>
      </div>

      <form id="usuarioForm" class="space-y-4 p-6">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-slate-900">ID Usuario</label>
            <input id="form_user_id" type="text" class="mt-1 block w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900" required>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-900">Contraseña</label>
            <input id="form_password" type="password" class="mt-1 block w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900" required>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-slate-900">Nombre</label>
            <input id="form_name" type="text" class="mt-1 block w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900" required>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-900">Apellidos</label>
            <input id="form_lastname" type="text" class="mt-1 block w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900" required>
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-slate-900">Teléfono</label>
            <input id="form_phone" type="tel" class="mt-1 block w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900" required>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-900">Correo</label>
            <input id="form_email" type="email" class="mt-1 block w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-900">Permisos</label>
          <select id="form_permission" class="mt-1 block w-full rounded-xl border border-slate-300 bg-white p-3 text-slate-900" required>
            <option value="">Selecciona un nivel</option>
            <option value="invitado">Invitado</option>
            <option value="profesional">Profesional</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>

        <div class="flex gap-3 border-t border-slate-200 pt-6">
          <button type="button" id="cancelarBtn" class="flex-1 rounded-xl border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-900 hover:bg-slate-100">Cancelar</button>
          <button type="submit" class="flex-1 rounded-xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white hover:bg-slate-800">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/username.js"></script>
  <script src="js/dropdown-menu.js"></script>
  <script>
    // Ocultar checkboxes inicialmente
    document.querySelectorAll('.hidden-checkbox').forEach(el => {
      el.style.display = 'none';
    });
  </script>
  <script src="js/usuarios.js"></script>
</body>
</html>
