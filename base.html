<script src="https://cdn.tailwindcss.com"></script>

<div class="min-h-screen bg-gradient-to-br from-[#e0f2fe] to-[#bae6fd] text-slate-900">
    <header class="border-b border-[#16a34a] bg-[#22c55e] backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-2.5">
            <div class="flex items-center gap-2.5">
                <div class="flex h-20 w-20 items-center justify-center rounded-xl">
                    <img src="img/ucc.png" alt="Logo" class="h-20 w-20 object-contain">
                </div>
                <div>
                    <p class="text-sm font-semibold tracking-[0.2em] text-white">Sistema de Mantenimiento</p>
                </div>
            </div>
            <div class="hidden text-sm text-slate-400 md:block text-white">Acceso seguro al sistema</div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-[#e0f2fe] to-[#bae6fd]">
        <div class="flex min-h-[calc(100vh-73px)] flex-col items-center justify-center px-6 py-10">
            <div class="w-full max-w-md rounded-2xl border border-white/20 bg-white/10 shadow-2xl shadow-black/20 backdrop-blur">
                <div class="p-6 space-y-6 sm:p-8">
                    <div>
                        <p class="text-center font-semibold uppercase tracking-[0.2em] text-black">Bienvenido</p>
                        <h1 class="mt-2 text-center font-bold leading-tight text-slate-900 md:text-3xl">Inicia Sesión</h1>
                    </div>
                    <form id="loginForm" class="space-y-4 md:space-y-6">
                        <div>
                            <label for="techId" class="mb-2 block text-sm font-medium text-slate-900">ID técnico</label>
                            <input type="text" name="techId" id="techId" class="block w-full rounded-xl border border-white/30 bg-white/20 p-3 text-slate-900 placeholder-slate-700 shadow-sm outline-none transition focus:border-white focus:ring-2 focus:ring-white/30" placeholder="Ingresa tu ID" required>
                        </div>
                        <div>
                            <label for="password" class="mb-2 block text-sm font-medium text-slate-900">Contraseña</label>
                            <input type="password" name="password" id="password" placeholder="••••••••" class="block w-full rounded-xl border border-white/30 bg-white/20 p-3 text-slate-900 placeholder-slate-700 shadow-sm outline-none transition focus:border-white focus:ring-2 focus:ring-white/30" required>
                        </div>
                        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                            <label class="flex items-center gap-3 text-sm text-slate-900">
                                <input id="remember" aria-describedby="remember" type="checkbox" class="h-4 w-4 rounded border-white/30 bg-white/20 text-[#22c55e] focus:ring-[#22c55e]">
                                Mantener sesión iniciada
                            </label>
                            <a href="#" class="text-sm font-medium text-slate-900 transition hover:text-slate-800 hover:underline">Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="w-full rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-black/20 transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-700 focus:ring-offset-2 focus:ring-offset-[#22c55e]">Iniciar Sesión</button>
                        <p class="text-center text-sm text-slate-900">
                            Solicita al jefe de area para acceder.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </section>
</div>
<script src="js/auth.js"></script>
