<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Formulario de Mantenimientos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#e0f2fe] to-[#bae6fd] text-slate-900">
  <header class="border-b border-[#16a34a] bg-[#22c55e] backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-2.5">
      <div class="flex items-center gap-2.5">
        <div class="flex h-20 w-20 items-center justify-center rounded-xl">
          <img src="img/ucc.png" alt="Logo" class="h-20 w-20 object-contain">
        </div>
        <div>
          <p class="text-sm font-semibold tracking-[0.2em] text-white">Sistema de Mantenimiento</p>
        </div>
      </div>

      <div class="relative">
        <button
          id="userMenuButton"
          type="button"
          class="inline-flex items-center gap-2 rounded-xl border border-white/30 bg-white/10 px-4 py-2 text-sm font-semibold text-white transition hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white/40"
        >
          Hola, <span id="username" class="font-bold">Usuario</span>
          <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.168l3.71-3.94a.75.75 0 0 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06Z" clip-rule="evenodd"/>
          </svg>
        </button>

        <div id="userMenu" class="absolute right-0 z-20 mt-2 hidden w-52 rounded-2xl border border-slate-200 bg-white p-2 shadow-lg shadow-black/20">
          <a href="usuarios.html" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">Panel de usuarios</a>
          <a href="equipos.html" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">Panel de registros</a>
          <a href="base.html" class="block rounded-xl px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100">Cerrar sesion</a>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-4 py-10 md:pt-10">
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Formulario de Mantenimientos</h1>
    <p class="text-sm text-slate-700 mb-6">Registra un nuevo mantenimiento</p>

    <form id="maintenanceForm" class="space-y-4 rounded-2xl border border-slate-200 bg-white p-6 shadow-lg">
      <div>
        <label class="block text-sm font-medium text-slate-900">Fecha</label>
        <input id="m_date" type="date" class="mt-1 block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" required>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
        <div>
          <label class="block text-sm font-medium text-slate-900">Piso</label>
          <select id="m_floor" class="mt-1 block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" required>
            <option value="">Selecciona</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-900">Espacio</label>
          <select id="m_space" class="mt-1 block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" required>
            <option value="">Selecciona</option>
            <option>Recepción</option>
            <option>Aula 407</option>
            <option>Sala de juntas</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-900">Modelo</label>
          <select id="m_model" class="mt-1 block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" required>
            <option value="">Selecciona</option>
            <option>Split 12000 BTU</option>
            <option>Cassette 24000 BTU</option>
            <option>Piso-techo 36000 BTU</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-slate-900">Marca</label>
          <select id="m_brand" class="mt-1 block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" required>
            <option value="">Selecciona</option>
            <option>Carrier</option>
            <option>Trane</option>
            <option>LG</option>
          </select>
        </div>

        <div class="flex items-end gap-3">
          <a href="mantes.html" class="w-full rounded-xl bg-red-600 px-6 py-3 text-center text-sm font-semibold text-white hover:bg-red-700">Volver</a>
          <button type="submit" class="w-full rounded-xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white hover:bg-slate-800">Enviar</button>
        </div>
      </div>
    </form>
  </main>

  <script src="js/forman.js"></script>
</body>
</html>
