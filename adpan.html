<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Completa tu perfil</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#e0f2fe] to-[#bae6fd] text-slate-900">
  <header class="border-b border-[#16a34a] bg-[#22c55e] backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-2.5">
      <div class="flex items-center gap-2.5">
        <div class="flex h-20 w-20 items-center justify-center rounded-xl">
          <img src="img/ucc.png" alt="Logo" class="h-20 w-20 object-contain">
        </div>
        <div>
          <p class="text-sm font-semibold tracking-[0.2em] text-white">Sistema de Mantenimiento</p>
        </div>
      </div>
      <div class="hidden text-sm text-slate-400 md:block text-white">Acceso seguro al sistema</div>
    </div>
  </header>

  <main class="flex min-h-[calc(100vh-73px)] items-center justify-center px-4 py-4 pt-4">
    <div class="flex w-full max-w-lg flex-col items-stretch gap-4 pt-2">
      <div class="text-center">
        <h1 class="text-2xl font-bold md:text-3xl text-slate-900">Complete su información</h1>
        <p class="mt-1 text-slate-700">Rellene los datos para completar su perfil</p>
      </div>

    <div class="w-full rounded-2xl border border-white/20 bg-white p-6 shadow-2xl shadow-black/20">
      <form id="profileForm" class="space-y-4">
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-900">Nombre</label>
          <input id="pf_name" type="text" class="block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" placeholder="Nombre" required>
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-900">Apellidos</label>
          <input id="pf_lastname" type="text" class="block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" placeholder="Apellidos" required>
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-900">Número de teléfono (sin +57)</label>
          <input id="pf_phone" type="tel" class="block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" placeholder="Ej: 3123456789" required>
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-900">Correo electrónico</label>
          <input id="pf_email" type="email" class="block w-full rounded-xl border border-white/30 bg-white p-3 text-slate-900" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="pt-2">
          <button type="submit" class="w-full rounded-xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white hover:bg-slate-800 transition">Completar perfil</button>
        </div>
      </form>
    </div>
    </div>
  </main>

  <script>
    // Pre-rellenar datos si el usuario existe en la base de datos
    function preloadUserData() {
      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) return;

      const users = JSON.parse(localStorage.getItem('users')) || [];
      const user = users.find(u => u.user_id === currentUser);

      if (user) {
        document.getElementById('pf_name').value = user.name;
        document.getElementById('pf_lastname').value = user.lastname;
        document.getElementById('pf_phone').value = user.phone;
        document.getElementById('pf_email').value = user.email;
      }
    }

    // Inicializar usuarios si no existen
    function initializeUsers() {
      if (!localStorage.getItem('users')) {
        localStorage.setItem('users', JSON.stringify([]));
      }
    }

    // Guardar datos del perfil
    document.getElementById('profileForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const currentUser = localStorage.getItem('currentUser');
      if (!currentUser) {
        alert('Usuario no identificado');
        return;
      }

      const name = document.getElementById('pf_name').value;
      const lastname = document.getElementById('pf_lastname').value;
      const phone = document.getElementById('pf_phone').value;
      const email = document.getElementById('pf_email').value;

      let users = JSON.parse(localStorage.getItem('users')) || [];
      let userIndex = users.findIndex(u => u.user_id === currentUser);

      if (userIndex > -1) {
        // Actualizar usuario existente
        users[userIndex].name = name;
        users[userIndex].lastname = lastname;
        users[userIndex].phone = phone;
        users[userIndex].email = email;
      } else {
        // Crear usuario nuevo
        users.push({
          registro_id: users.length > 0 ? Math.max(...users.map(u => u.registro_id || 0)) + 1 : 1,
          user_id: currentUser,
          password: 'default',
          permission: 'profesional',
          name: name,
          lastname: lastname,
          phone: phone,
          email: email
        });
      }

      localStorage.setItem('users', JSON.stringify(users));
      alert('Perfil actualizado correctamente.');
      window.location.href = 'mantes.html';
    });

    initializeUsers();
    preloadUserData();
  </script>
</body>
</html>
